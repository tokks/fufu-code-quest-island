<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>编程闯关岛</title>
    <link href="https://cdn.bootcdn.net/ajax/libs/twitter-bootstrap/5.3.0/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.bootcdn.net/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body class="start-page">
    <div class="cyber-bg"></div>
    <div class="cyber-grid"></div>
    <div class="cyber-scan"></div>
    
    <div class="container min-vh-100 py-8">
        <div class="row align-items-center">
            <div class="col-lg-6 cyber-left">
                <div class="cyber-title-container">
                    <div class="cyber-line"></div>
                    <h1 class="game-title">
                        <i class="fas fa-gamepad cyber-icon"></i>
                        编程闯关岛
                    </h1>
                    <div class="cyber-line"></div>
                </div>
                <p class="subtitle">CYBER ISLAND - 编程冒险之旅</p>
                
                <div class="cyber-intro mt-6">
                    <p class="intro-text">在这个赛博世界中，你将化身编程冒险者，穿越代码丛林，挑战算法怪兽，最终击败Bug之王！</p>
                    <div class="stats-row mt-4">
                        <div class="stat-box">
                            <span class="stat-number">21</span>
                            <span class="stat-label">关卡区域</span>
                        </div>
                        <div class="stat-box">
                            <span class="stat-number">100+</span>
                            <span class="stat-label">编程题目</span>
                        </div>
                        <div class="stat-box">
                            <span class="stat-number">∞</span>
                            <span class="stat-label">无限可能</span>
                        </div>
                    </div>
                </div>
                
                <div class="cyber-features mt-8">
                    <div class="feature-item">
                        <div class="feature-icon cyber-cyan"><i class="fas fa-map"></i></div>
                        <div class="feature-content">
                            <h4>探索世界地图</h4>
                            <p>穿越变量森林、函数殿堂、面向对象等神秘区域</p>
                        </div>
                    </div>
                    <div class="feature-item">
                        <div class="feature-icon cyber-purple"><i class="fas fa-sword"></i></div>
                        <div class="feature-content">
                            <h4>战斗答题系统</h4>
                            <p>用代码知识击败敌人，提升战斗属性</p>
                        </div>
                    </div>
                    <div class="feature-item">
                        <div class="feature-icon cyber-green"><i class="fas fa-shield-alt"></i></div>
                        <div class="feature-content">
                            <h4>收集稀有装备</h4>
                            <p>解锁变量戒指、函数宝典、装饰器护盾</p>
                        </div>
                    </div>
                </div>
            </div>
            
            <div class="col-lg-6 cyber-right">
                <div class="cyber-card">
                    <div class="card-glow"></div>
                    <div class="card-corner tl"></div>
                    <div class="card-corner tr"></div>
                    <div class="card-corner bl"></div>
                    <div class="card-corner br"></div>
                    
                    <div class="card-header cyber-header">
                        <div class="header-line"></div>
                        <h2><i class="fas fa-user-plus"></i> 创建冒险者</h2>
                        <div class="header-line"></div>
                    </div>
                    
                    <div class="card-body">
                        <form id="newGameForm">
                            <div class="input-group cyber-input">
                                <div class="input-icon"><i class="fas fa-user"></i></div>
                                <input type="text" id="playerName" placeholder="输入角色名称" maxlength="20" required>
                            </div>
                            
                            <div id="playerStatus" class="player-status"></div>
                            
                            <button type="submit" class="cyber-btn">
                                <span class="btn-text"><i class="fas fa-play"></i> <span id="btnText">开始冒险</span></span>
                                <span class="btn-glow"></span>
                            </button>
                        </form>
                        
                        <div class="cyber-divider">
                            <span class="divider-text">或者</span>
                        </div>
                        
                        <button type="button" class="cyber-btn-secondary" onclick="toggleAdminLogin()">
                            <i class="fas fa-key"></i> 管理员登录
                        </button>
                        
                        <form id="adminLoginForm" class="admin-form d-none">
                            <div class="input-group cyber-input">
                                <div class="input-icon"><i class="fas fa-user-shield"></i></div>
                                <input type="text" id="adminUsername" placeholder="用户名" required>
                            </div>
                            <div class="input-group cyber-input">
                                <div class="input-icon"><i class="fas fa-lock"></i></div>
                                <input type="password" id="adminPassword" placeholder="密码" required>
                            </div>
                            <button type="submit" class="cyber-btn admin-btn">
                                <span class="btn-text"><i class="fas fa-shield-alt"></i> 管理员登录</span>
                                <span class="btn-glow"></span>
                            </button>
                        </form>
                        
                        <div class="card-footer">
                            <p>准备好踏上编程之旅了吗？</p>
                            <p class="small-text">学习 Python，收集装备，击败 Bug 之王！</p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
        
        <div class="cyber-footer mt-12">
            <div class="footer-grid">
                <div class="footer-item">
                    <i class="fas fa-code"></i>
                    <span>Python 编程</span>
                </div>
                <div class="footer-item">
                    <i class="fas fa-gamepad"></i>
                    <span>游戏化学习</span>
                </div>
                <div class="footer-item">
                    <i class="fas fa-users"></i>
                    <span>社区互动</span>
                </div>
                <div class="footer-item">
                    <i class="fas fa-trophy"></i>
                    <span>成就系统</span>
                </div>
            </div>
        </div>
    </div>
    
    <script src="https://cdn.bootcdn.net/ajax/libs/twitter-bootstrap/5.3.0/js/bootstrap.bundle.min.js"></script>
    <script>
        const playerNameInput = document.getElementById('playerName');
        const playerStatus = document.getElementById('playerStatus');
        const btnText = document.getElementById('btnText');
        let playerExists = false;
        
        playerNameInput.addEventListener('input', function() {
            const name = this.value.trim();
            
            if (!name) {
                playerStatus.innerHTML = '';
                btnText.textContent = '开始冒险';
                playerExists = false;
                return;
            }
            
            fetch('/api/check_player', {
                method: 'POST',
                headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                body: `name=${encodeURIComponent(name)}`
            })
            .then(response => response.json())
            .then(data => {
                playerExists = data.exists;
                if (data.exists) {
                    playerStatus.innerHTML = '<span class="text-success"><i class="fas fa-user-check"></i> 检测到已有角色，将直接登录</span>';
                    btnText.textContent = '继续游戏';
                } else {
                    playerStatus.innerHTML = '<span class="text-info"><i class="fas fa-user-plus"></i> 新角色，将创建存档</span>';
                    btnText.textContent = '开始冒险';
                }
            });
        });
        
        document.getElementById('newGameForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const name = document.getElementById('playerName').value.trim();
            
            if (!name) {
                alert('请输入角色名称');
                return;
            }
            
            fetch('/new_game', {
                method: 'POST',
                headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                body: `name=${encodeURIComponent(name)}`
            })
            .then(response => {
                if (response.redirected) {
                    window.location.href = response.url;
                } else {
                    return response.json();
                }
            })
            .then(data => {
                if (data && !data.success) {
                    alert(data.message);
                }
            });
        });
        
        function toggleAdminLogin() {
            const form = document.getElementById('adminLoginForm');
            form.classList.toggle('d-none');
        }
        
        document.getElementById('adminLoginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const username = document.getElementById('adminUsername').value.trim();
            const password = document.getElementById('adminPassword').value.trim();
            
            fetch('/admin_login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                body: `username=${encodeURIComponent(username)}&password=${encodeURIComponent(password)}`
            })
            .then(response => {
                if (response.redirected) {
                    window.location.href = response.url;
                } else {
                    return response.json();
                }
            })
            .then(data => {
                if (data && !data.success) {
                    alert(data.message);
                }
            });
        });
    </script>
</body>
</html>
